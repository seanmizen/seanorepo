x-frontend-base: &frontend-base
  container_name: converter-fe
  build:
    context: ../..
    dockerfile: apps/converter/frontend/dockerfile
    target: ${BUILD_TARGET:-dev}
  ports:
    - "4040:4040"

x-backend-base: &backend-base
  container_name: converter-be
  build:
    context: ../..
    dockerfile: apps/converter/backend/dockerfile
    target: ${BUILD_TARGET:-dev}
  ports:
    - "4041:4041"
  environment:
    - PORT=4041
    - WORKERS=4
    - MAX_UPLOAD_MB=500
    - FILE_TTL=1h
    - TEMP_DIR=/tmp/converter

services:
  frontend:
    <<: *frontend-base
    profiles: ["prod"]

  frontend-dev:
    <<: *frontend-base
    volumes:
      - type: bind
        source: ../../apps/converter/frontend
        target: /app
      - fe_node_modules:/app/node_modules
    profiles: ["dev"]

  backend:
    <<: *backend-base
    profiles: ["prod"]

  backend-dev:
    <<: *backend-base
    volumes:
      - type: bind
        source: ../../apps/converter/backend
        target: /app/apps/converter/backend
      - go_cache:/root/.cache/go-build
      - go_mod_cache:/go/pkg/mod
    profiles: ["dev"]

volumes:
  fe_node_modules:
  go_cache:
  go_mod_cache:
